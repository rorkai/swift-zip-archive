name: CI

on:
  push:
    branches:
      - main
    paths:
      - "**.swift"
      - "**.yml"
  pull_request:
  workflow_dispatch:

jobs:
  macos:
    runs-on: macos-26
    timeout-minutes: 15
    steps:
      - name: Select appropriate Xcode version
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90  # v1.7.0
        with:
          xcode-version: latest-stable
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - name: SPM tests
        run: swift test --enable-code-coverage
      - name: Convert coverage files
        run: |
          xcrun llvm-cov export -format "lcov" \
            .build/debug/swift-zip-archivePackageTests.xctest/Contents/MacOs/swift-zip-archivePackageTests \
            -ignore-filename-regex="\/Tests\/" \
            -instr-profile=.build/debug/codecov/default.profdata > info.lcov
      - name: Upload to codecov.io
        uses: codecov/codecov-action@v4
        with:
          file: info.lcov
          token: ${{ secrets.CODECOV_TOKEN }}

  linux:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        image: ["swift:6.1", "swift:6.2", "swift:6.3"]

    container:
      image: ${{ matrix.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Test
        run: |
          swift test --enable-code-coverage
      - name: Convert coverage files
        run: |
          llvm-cov export -format="lcov" \
            .build/debug/swift-zip-archivePackageTests.xctest \
            -ignore-filename-regex="\/Tests\/" \
            -instr-profile .build/debug/codecov/default.profdata > info.lcov
      - name: Upload to codecov.io
        uses: codecov/codecov-action@v4
        with:
          files: info.lcov
          token: ${{ secrets.CODECOV_TOKEN }}

  openbsd:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    container:
      image: ghcr.io/3405691582/openbsd-swift-amd64:7.8@sha256:99cfe86f3630a201dc4f539c09a675b399dd6731fff85ece265168d59f3b91cc
      env:
        CPU: "4"
        MEM: "16G"
        KVM: "-enable-kvm"
      options: --device /dev/kvm
    env:
      META_DATA_CONTENT: |
        {
          "instance-id": "iid-local01",
          "dsmode": "local"
        }
      USER_DATA_CONTENT: |
        #cloud-config
        timezone: UTC
        write_files:
        - content: |
            set -ex
            function report {
                echo "$result" > /tmp/result
                tar cvf /dev/sd1c -C /tmp result
                trap - EXIT
                halt -p
            }
            result=1
            trap report EXIT
            printf '\033\143'
            export PATH=/usr/local/bin:$PATH
            mount /dev/sd3c /mnt
            cp -r /mnt/repo /home/repo/
            cd /home/repo/
            swift test
            result=0
          path: /etc/rc.local
          permissions: '0755'
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          persist-credentials: false
      - name: Prepare cloud-init
        run: |
          echo "$META_DATA_CONTENT" > /usr/local/share/cidata/meta-data
          echo "$USER_DATA_CONTENT" > /usr/local/share/cidata/user-data
          mkdir -p /usr/local/share/cidata/repo
          tar --exclude=.git -C "$GITHUB_WORKSPACE" -cf - . \
            | tar -x -C /usr/local/share/cidata/repo
      - name: Test
        run: /usr/local/bin/cmd.sh
      - name: Report result
        run: exit "$(cat /usr/local/share/tape/result)"

  windows:
    runs-on: windows-latest
    steps:
      - uses: compnerd/gha-setup-swift@v0.4.0
        with:
          swift-version: swift-6.3-release
          swift-build: 6.3-RELEASE
      - name: Checkout
        uses: actions/checkout@v6
      - name: Swift version
        run: |
          swift --version
      - name: Test
        run: |
          swift test
